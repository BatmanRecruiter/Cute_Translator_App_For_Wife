name: Deploy to Hugging Face Space
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face Space
        run: |
          git remote add space https://BatmanRecruiter:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/BatmanRecruiter/real-crystyl-translator
          git push space main --force
