<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F3D7A"/>
      <stop offset="1" stop-color="#0F2552"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBEFC8"/>
      <stop offset="0.55" stop-color="#E8BE5E"/>
      <stop offset="1" stop-color="#A6822F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#F4D27A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F4D27A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#glow)"/>

  <!-- tiny sparkles -->
  <g fill="#F4D27A" opacity="0.85">
    <circle cx="80"  cy="92"  r="3"/>
    <circle cx="430" cy="110" r="2.5"/>
    <circle cx="120" cy="430" r="2.5"/>
    <circle cx="420" cy="400" r="3"/>
    <circle cx="60"  cy="260" r="2"/>
    <circle cx="460" cy="260" r="2"/>
  </g>

  <!-- crystal -->
  <g transform="translate(256 256)">
    <path d="M 0 -180 L 130 -60 L 0 200 L -130 -60 Z"
          fill="url(#gold)" stroke="#FBEFC8" stroke-width="6" stroke-linejoin="round"/>
    <g stroke="#1F3D7A" stroke-width="5" stroke-linejoin="round" fill="none" opacity="0.55">
      <path d="M -130 -60 L 130 -60"/>
      <path d="M 0 -180 L 0 200"/>
      <path d="M -65 -60 L 0 200 L 65 -60"/>
    </g>
  </g>
</svg>
