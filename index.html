<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1F3D7A" />
  <meta name="description" content="Crystyl — Casual English ↔ Mexican Spanish translator" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Crystyl" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <title>Crystyl — Casual Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Sparkle layer -->
  <div class="sparkles" aria-hidden="true" data-testid="layer-sparkles"></div>

  <main class="app" data-testid="app-root">
    <header class="header">
      <div class="logo-wrap" aria-label="Crystyl">
        <svg class="logo" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="gld" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#F4D27A"/>
              <stop offset="1" stop-color="#C9A24B"/>
            </linearGradient>
          </defs>
          <!-- crystal/diamond shape -->
          <path d="M32 4 L52 24 L32 60 L12 24 Z" fill="url(#gld)" stroke="#1F3D7A" stroke-width="2" stroke-linejoin="round"/>
          <path d="M12 24 L52 24 M32 4 L32 60 M22 24 L32 60 L42 24" stroke="#1F3D7A" stroke-width="1.4" stroke-linejoin="round" opacity="0.55"/>
        </svg>
        <h1 class="brand" data-testid="text-brand">Crystyl</h1>
      </div>
      <p class="tagline" data-testid="text-tagline">A little love-letter translator · EN ⇄ MX-ES</p>
    </header>

    <section class="quote-card" data-testid="card-quote" aria-live="polite">
      <div class="quote-eyebrow">
        <span aria-hidden="true">✦</span>
        <span>Today’s reminder for Crystyl</span>
        <span aria-hidden="true">✦</span>
      </div>
      <span class="quote-mark" aria-hidden="true">✧</span>
      <p class="quote-text" id="quote-text" data-testid="text-quote">Loading a little reminder…</p>
      <p class="quote-cite" id="quote-cite" data-testid="text-quote-citation"></p>
    </section>

    <section class="card translate-card">
      <label class="field-label" for="input-text">Type or paste a message</label>
      <textarea
        id="input-text"
        class="input"
        rows="5"
        placeholder="Write in English or Spanish…"
        autocomplete="off"
        autocorrect="on"
        spellcheck="true"
        data-testid="input-text"
      ></textarea>

      <div class="row row-clear">
        <button class="btn btn-ghost" id="btn-clear" type="button" data-testid="button-clear">Clear</button>
        <span class="detected" id="detected" data-testid="text-detected"></span>
      </div>

      <div class="row row-actions">
        <button class="btn btn-primary" id="btn-translate" type="button" data-testid="button-translate">
          <span class="btn-label">Translate</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
        <button class="btn btn-gold" id="btn-copy" type="button" data-testid="button-copy" disabled>Copy</button>
      </div>

      <label class="field-label output-label" for="output-text">Translation</label>
      <div class="output" id="output-text" data-testid="text-output" aria-live="polite" tabindex="0">
        <span class="placeholder">Your translation will appear here ✨</span>
      </div>

      <p class="status" id="status" data-testid="text-status" role="status" aria-live="polite"></p>
    </section>

    <footer class="footer">
      <p>Made with <span class="gold">✦</span> for Crystyl</p>
    </footer>
  </main>

  <script src="quotes.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
